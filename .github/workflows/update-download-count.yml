name: Update Download Count

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch download count from GitHub API
        id: count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          total=$(gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq '[.[].assets[].download_count] | add // 0')
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "Total downloads across all releases: $total"

      - name: Update repo/repo.json
        run: |
          jq --argjson c ${{ steps.count.outputs.total }} \
             '(.[0].DownloadCount) = $c' repo/repo.json > repo/repo.json.tmp
          mv repo/repo.json.tmp repo/repo.json

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add repo/repo.json
          if ! git diff --cached --quiet; then
            git commit -m "Update DownloadCount to ${{ steps.count.outputs.total }}"
            git push origin HEAD:main
          else
            echo "No change in download count."
          fi
